name: Weekly UFL Data Sync

on:
  schedule:
    # Runs at 10:00 AM UTC (6 AM ET) every Tuesday
    - cron: '0 10 * * 2'
  workflow_dispatch: # Allows you to run it manually to test it right now

jobs:
  sync_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4

      - name: Fetch file from source repository
        run: |
          curl -L -H "Accept: application/vnd.github.v3.raw" \
          -o UFL/UFLWTmp.htm \
          https://githubusercontent.com

      - name: Commit and push if changed
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add UFL/UFLWTmp.htm
          if git diff --staged --quiet; then
            echo "No changes detected."
          else
            git commit -m "Automated Tuesday sync of UFLWTmp.htm"
            git push
          fi

