<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE NFL EDGE | PanaGeo Algorithmic Suite</title>
    <style>
        :root {
            --nfl-navy: #00205B;
            --nfl-red: #BF0A30;
            --bg-dark: #050505;
            --sidebar-width: 80px;
            --header-height: 100px;
            --footer-height: 40px;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            overflow: hidden; /* Essential for the dashboard feel */
        }

        /* DASHBOARD LAYOUT */
        .dashboard-container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR (NAV) */
        .sidebar {
            width: var(--sidebar-width);
            background-color: #000;
            border-right: 1px solid #222;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            z-index: 100;
        }

        .helmet-logo {
            width: 60px;
            height: 60px;
            animation: spin 2.5s linear infinite; /* Keeps the helm spinning */
            cursor: pointer;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* MAIN CONTENT AREA */
        .main-pane {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* TOP HEADER */
        .top-header {
            height: var(--header-height);
            background: linear-gradient(90deg, #000 0%, var(--nfl-navy) 100%);
            border-bottom: 2px solid var(--nfl-red);
            display: flex;
            align-items: center;
            padding: 0 30px;
        }

        .nfl-banner {
            height: 60px;
        }

        /* IFRAME VIEWPORT */
        .projection-frame {
            flex-grow: 1;
            width: 100%;
            border: none;
            background-color: #000;
            /* Leaves room for the footer */
            margin-bottom: var(--footer-height);
        }

        /* FLOATING FOOTER */
        .floating-footer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: var(--footer-height);
            background-color: #000;
            border-top: 2px solid var(--nfl-red); /* Your signature divider */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 110;
        }

        .footer-text {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #777;
        }

        .footer-text span {
            color: var(--nfl-red);
            font-weight: bold;
        }

        /* NAV BUTTONS */
        .nav-group { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; }
        .nav-btn {
            color: #fff; text-decoration: none; font-size: 10px; font-weight: bold;
            padding: 8px 0; width: 60px; text-align: center; border: 1px solid #333;
            background: #111; transition: 0.3s;
        }
        .nav-btn:hover { background: var(--nfl-red); border-color: #fff; }

    </style>
</head>
<body>

    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <img src="/images/HelmtSpin.gif" class="helmet-logo" alt="PanaGeo Logo">
            <div class="nav-group">
                <a href="UFL/UFLWTmp.htm" target="data_viewport" class="nav-btn">UFL</a>
                <a href="nfleCX.htm" target="data_viewport" class="nav-btn">NFL</a>
                <a href="Archives/Index.htm" target="data_viewport" class="nav-btn">STATS</a>
            </div>
        </aside>

        <!-- MAIN VIEW -->
        <main class="main-pane">
            <header class="top-header">
                <img src="/images/RNEWBanner23.gif" class="nfl-banner" alt="The NFL Edge">
            </header>

            <!-- DATA VIEWPORT -->
            <iframe src="UFL/UFLWTmp.htm" name="data_viewport" class="projection-frame"></iframe>

            <!-- FLOATING FOOTER -->
            <footer class="floating-footer">
                <div class="footer-text">
                    The NFL Edge : powered by <span>PanaGeoTech</span> (c) 2026
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
