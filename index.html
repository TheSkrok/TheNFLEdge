<!DOCTYPE html>
<html lang="en">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;

        body {
            background-color: black;
            color: white;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
        }
        
        .page-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 30px 20px 0 20px;
        }

        /* ====================== NEW BANNER TABLE ====================== */
        .banner-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        .banner-table td {
            vertical-align: middle;
            padding: 0;
        }
        
        /* Left column - Spinning Football Logo */
        .logo-column {
            width: 120px;           /* small column - adjust if needed */
            text-align: center;
            padding-right: 15px;
        }
        
        .logo-column img {
            width: 100px;           /* size of spinning football */
            height: 100px;
            animation: spin 2.5s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Right column - Site Banner */
        .banner-column img {
            width: 100%;
            max-height: 150px;      /* keeps banner roughly 600x150 */
            height: auto;
            display: block;
            border: 3px solid #ff0000;
            border-radius: 8px;
        }

        /* Breadcrumb row (spans both columns) */
        .breadcrumb-row {
            padding: 15px 0 0 0;
            background-color: #1a1a1a;
            border: 2px solid #333;
            border-radius: 4px;
            text-align: center;
        }

        .breadcrumb a {
            color: #ff0000;
            text-decoration: none;
            margin: 0 8px;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        
        .breadcrumb a:hover {
            color: #ff6666;
        }
        
        .breadcrumb span {
            color: #666;
            margin: 0 5px;
        }

        /* Rest of your original styles (unchanged) */
        .subheader {
            margin: 30px 0 10px 0;
            font-size: 18px;
            font-weight: bold;
        }
        
        .main-title {
            font-size: 48px;
            font-weight: bold;
            color: white;
            margin: 10px 0;
            letter-spacing: 2px;
        }
        
        .tagline {
            font-size: 13px;
            color: #cccccc;
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .content-frame {
            width: 100%;
            height: 500px;
            border: 2px solid #ff0000;
            border-radius: 8px;
            margin: 30px 0;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
        }
      
        /* Responsive iframe inside content-frame */
        .content-frame iframe {
            width: 100%;
            height: 80vh;
            border: none;
        }

        .copyright {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 30px;
            padding: 20px 0;
            border-top: 1px solid #333;
        }
        
        .legal-disclaimer {

            font-size: 8px;
            line-height: 1.3;
            margin-top: 40px;
            padding: 15px 20px;
            text-align: center;
            border-top: 2px solid #ff0000;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }
    </style>
</head>
